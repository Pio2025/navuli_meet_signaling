services:
  - type: web
    name: navuli-meet-signaling
    env: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://your-navulimeet-domain.com
      - key: PORT
        value: 3001
