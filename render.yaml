services:
  - type: web
    name: navuli-meet-signaling
    env: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://meet.navulifiji.com,http://localhost
      - key: NODE_ENV
        value: production
